<?php
// 1. INICIAR SESIÓN (Siempre debe ser la primera línea)
session_start();

// 2. VERIFICAR SI YA ESTÁ LOGUEADO
if(isset($_SESSION["loggedin"]) && $_SESSION["loggedin"] === true){
    if($_SESSION["rol"] === 'administrador'){
        header("location: menuAdministrador.php");
        exit;
    } else {
        header("location: menuColaborador.php");
        exit;
    }
}

// 3. CONEXIÓN A LA BASE DE DATOS
require_once "conexion.php"; 

// Inicializar variables
$username = $password = $rol = "";
$username_err = $password_err = $login_err = $rol_err = "";

// 4. PROCESAR FORMULARIO AL ENVIAR
if ($_SERVER["REQUEST_METHOD"] == "POST") {

    // Validar usuario
    if (empty(trim($_POST["usuario"]))) {
        $username_err = "Ingrese su usuario.";
    } else {
        $username = trim($_POST["usuario"]);
    }

    // Validar contraseña
    if (empty(trim($_POST["password"]))) {
        $password_err = "Ingrese su contraseña.";
    } else {
        $password = trim($_POST["password"]);
    }
    
    // Validar Rol
    if (empty($_POST["rol_seleccionado"])) {
        $rol_err = "Seleccione un rol.";
    } else {
        $rol = trim($_POST["rol_seleccionado"]);
    }

    // Si no hay errores de validación, consultar DB
    if (empty($username_err) && empty($password_err) && empty($rol_err)) {
        
        $sql = "SELECT id_usuario, usuario, password, rol, nombre_completo FROM usuarios WHERE usuario = ? AND rol = ?";
        
        if ($stmt = mysqli_prepare($link, $sql)) {
            mysqli_stmt_bind_param($stmt, "ss", $param_username, $param_rol);
            $param_username = $username;
            $param_rol = $rol;
            
            if (mysqli_stmt_execute($stmt)) {
                mysqli_stmt_store_result($stmt);
                
                if (mysqli_stmt_num_rows($stmt) == 1) {                    
                    mysqli_stmt_bind_result($stmt, $id_usuario, $username_db, $hashed_password, $rol_db, $nombre_completo_db);
                    
                    if (mysqli_stmt_fetch($stmt)) {
                        if ($password === $hashed_password) {
                            $_SESSION["loggedin"] = true;
                            $_SESSION["id_usuario"] = $id_usuario;
                            $_SESSION["usuario"] = $username_db;
                            $_SESSION["rol"] = $rol_db;
                            $_SESSION["nombre_completo"] = $nombre_completo_db; 
                            
                            if ($rol_db === 'administrador') {
                                header("location: menuAdministrador.php");
                            } else {
                                header("location: menuColaborador.php");
                            }
                            exit;
                        } else {
                            $login_err = "La contraseña es incorrecta.";
                        }
                    }
                } else {
                    $login_err = "No existe cuenta con ese Usuario y Rol.";
                }
            } else {
                echo "Ups! Algo salió mal. Por favor intente más tarde.";
            }
            mysqli_stmt_close($stmt);
        }
    }
    mysqli_close($link);
}
