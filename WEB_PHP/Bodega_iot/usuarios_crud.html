<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | Bodega_IOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto mb-6 flex items-center bg-blue-50 border-l-4 border-blue-500 text-blue-700 p-4 rounded-xl shadow-sm">
        <span class="mr-3 text-lg">ℹ️</span>
        <p class="text-[10px] font-black uppercase tracking-widest">Módulo de Seguridad: Gestión de Accesos (Prototipo Visual)</p>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="glass-card p-8 rounded-3xl shadow-xl border-t-8 border-green-700">
                <h2 class="text-xl font-extrabold text-gray-800 mb-6 flex items-center gap-2">
                    <span class="text-2xl">➕</span> Nuevo Usuario
                </h2>
                
                <form class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nombre Completo</label>
                        <input type="text" placeholder="Ej: Juan Pérez" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-4 focus:ring-green-100 focus:border-green-600 transition-all text-sm">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Usuario (Login)</label>
                        <input type="text" placeholder="Ej: jperez" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-4 focus:ring-green-100 focus:border-green-600 transition-all text-sm font-bold">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-4 focus:ring-green-100 focus:border-green-600 transition-all text-sm">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Rol en el Sistema</label>
                        <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-4 focus:ring-green-100 focus:border-green-600 transition-all text-sm font-semibold appearance-none cursor-pointer">
                            <option value="">-- Seleccionar --</option>
                            <option value="administrador">Administrador</option>
                            <option value="colaborador">Colaborador</option>
                        </select>
                    </div>

                    <button type="button" class="w-full bg-green-700 hover:bg-green-800 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-green-100 transition-all transform active:scale-95 mt-4">
                        CREAR USUARIO
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="glass-card rounded-3xl shadow-xl overflow-hidden h-full flex flex-col">
                <div class="px-8 py-6 border-b border-gray-100 bg-white/50 flex justify-between items-center">
                    <h2 class="text-sm font-extrabold text-gray-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="text-xl">👥</span> Lista de Usuarios
                    </h2>
                    <span class="text-[9px] font-black bg-gray-100 text-gray-400 px-3 py-1 rounded-full uppercase tracking-tighter">Total: 2 Cuentas</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-8 py-4">ID</th>
                                <th class="px-8 py-4">Nombre y Apellido</th>
                                <th class="px-8 py-4">Usuario</th>
                                <th class="px-8 py-4 text-center">Rol</th>
                                <th class="px-8 py-4 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-8 py-5 text-gray-300 font-bold">#01</td>
                                <td class="px-8 py-5">
                                    <span class="font-extrabold text-gray-700 block">Jose Gerson</span>
                                </td>
                                <td class="px-8 py-5 font-bold text-green-700 italic">gerson_admin</td>
                                <td class="px-8 py-5 text-center">
                                    <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[9px] font-black uppercase tracking-wider">Admin</span>
                                </td>
                                <td class="px-8 py-5 text-right">
                                    <div class="flex justify-end gap-2">
                                        <button class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all">✏️</button>
                                        </div>
                                </td>
                            </tr>
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-8 py-5 text-gray-300 font-bold">#02</td>
                                <td class="px-8 py-5">
                                    <span class="font-extrabold text-gray-700 block">Luis Arturo</span>
                                </td>
                                <td class="px-8 py-5 font-bold text-blue-700 italic">larturo_sales</td>
                                <td class="px-8 py-5 text-center">
                                    <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[9px] font-black uppercase tracking-wider">Colaborador</span>
                                </td>
                                <td class="px-8 py-5 text-right">
                                    <div class="flex justify-end gap-2">
                                        <button class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all">✏️</button>
                                        <button class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-all">🗑️</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="mt-auto bg-gray-50 px-8 py-4 border-t border-gray-100">
                    <p class="text-[9px] font-bold text-gray-300 uppercase tracking-[3px] text-center italic">
                        Security Control System - UNFV 2026
                    </p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
