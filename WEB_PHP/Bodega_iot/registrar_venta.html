<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta | Bodega_IOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto mb-6 flex items-center bg-green-50 border-l-4 border-green-500 text-green-700 p-4 rounded-xl shadow-sm">
        <span class="text-xl mr-3">✅</span>
        <p class="text-xs font-bold uppercase tracking-tight">Venta registrada correctamente. Ticket #2045 (Modo Demo)</p>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-card p-8 rounded-3xl shadow-xl border-t-8 border-blue-600">
                <h2 class="text-xl font-extrabold text-gray-800 mb-6 flex items-center gap-2">
                    <span class="text-2xl">🛒</span> Agregar Item
                </h2>
                
                <form class="space-y-5">
                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Seleccionar Producto</label>
                        <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all cursor-pointer text-sm font-semibold">
                            <option value="">-- Buscar Producto --</option>
                            <option>Arroz Costeño 1kg (Stock: 12)</option>
                            <option>Aceite Primor 1L (Stock: 45)</option>
                            <option>Leche Gloria Azul (Stock: 48)</option>
                            <option>Detergente Opal 1kg (Stock: 15)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Cantidad</label>
                        <input type="number" value="1" min="1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all text-sm font-bold">
                    </div>

                    <div class="bg-blue-50 p-4 rounded-2xl flex justify-between items-center">
                        <span class="text-xs font-bold text-blue-600 uppercase">Precio Unitario</span>
                        <span class="text-lg font-black text-blue-700">S/. 4.50</span>
                    </div>

                    <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                        <span>⬇️</span> AGREGAR A LA LISTA
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="glass-card rounded-3xl shadow-xl overflow-hidden h-full flex flex-col">
                <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-white/50">
                    <h2 class="text-sm font-extrabold text-gray-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="text-xl">📋</span> Detalle de Venta
                    </h2>
                    <button class="text-[10px] font-black text-red-500 hover:text-red-700 uppercase tracking-widest">Vaciar Carrito</button>
                </div>

                <div class="flex-grow overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50/50 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-8 py-4">Producto</th>
                                <th class="px-8 py-4 text-center">Cant.</th>
                                <th class="px-8 py-4 text-center">P. Unit</th>
                                <th class="px-8 py-4 text-center">Subtotal</th>
                                <th class="px-8 py-4 text-right"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 bg-white">
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-8 py-5">
                                    <span class="font-extrabold text-gray-700 block">Arroz Costeño 1kg</span>
                                    <span class="text-[9px] text-gray-400 uppercase font-bold">Peso: 1000g</span>
                                </td>
                                <td class="px-8 py-5 text-center font-bold text-gray-600">2</td>
                                <td class="px-8 py-5 text-center text-gray-500 text-xs">S/. 4.50</td>
                                <td class="px-8 py-5 text-center font-black text-blue-600">S/. 9.00</td>
                                <td class="px-8 py-5 text-right">
                                    <button class="text-red-400 hover:text-red-600 text-xl font-bold px-2">×</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="px-8 py-5">
                                    <span class="font-extrabold text-gray-700 block">Leche Gloria Azul</span>
                                    <span class="text-[9px] text-gray-400 uppercase font-bold">Peso: 400g</span>
                                </td>
                                <td class="px-8 py-5 text-center font-bold text-gray-600">3</td>
                                <td class="px-8 py-5 text-center text-gray-500 text-xs">S/. 4.20</td>
                                <td class="px-8 py-5 text-center font-black text-blue-600">S/. 12.60</td>
                                <td class="px-8 py-5 text-right">
                                    <button class="text-red-400 hover:text-red-600 text-xl font-bold px-2">×</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="bg-gray-50 p-8 border-t border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-sm font-black text-gray-400 uppercase tracking-widest">Total a Pagar</span>
                        <div class="text-right">
                            <span class="block text-4xl font-black text-green-700 tracking-tighter italic">S/. 21.60</span>
                            <span class="text-[10px] font-bold text-green-600/50 uppercase tracking-widest">Incluye impuestos</span>
                        </div>
                    </div>
                    
                    <button type="button" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-100 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3">
                        <span class="text-xl">✅</span> FINALIZAR VENTA
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
