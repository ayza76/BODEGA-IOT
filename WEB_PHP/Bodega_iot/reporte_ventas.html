<?php
// 1. Iniciar sesión y conexión
session_start();
require_once "conexion.php";

// Verificar acceso
if (!isset($_SESSION["loggedin"]) || $_SESSION["loggedin"] !== true) {
    header("location: index.php");
    exit;
}

// 2. Lógica de Fechas
// Si el usuario eligió una fecha en el filtro, usamos esa. Si no, usamos HOY.
$fecha_seleccionada = isset($_GET['fecha']) ? $_GET['fecha'] : date('Y-m-d');

// 3. Consulta SQL Compleja (JOINs)
// Unimos Ventas + Detalles + Productos + Usuarios para tener toda la info
$sql = "SELECT 
            v.venta_id, 
            v.fecha_venta, 
            v.total_venta, 
            u.usuario as vendedor,
            p.nombre as producto,
            d.peso_retirado,
            d.costo_linea
        FROM ventas v
        JOIN detalles_venta d ON v.venta_id = d.venta_id
        JOIN productos p ON d.producto_id = p.producto_id
        JOIN usuarios u ON v.usuario_id = u.id_usuario
        WHERE DATE(v.fecha_venta) = '$fecha_seleccionada'
        ORDER BY v.fecha_venta DESC";

$result = mysqli_query($link, $sql);

// 4. Calcular Totales para el Resumen
$total_dinero_dia = 0;
$total_peso_dia = 0;
$cantidad_transacciones = 0;

// Guardamos los datos en un array para no perder el puntero al recorrerlos 2 veces
// (Una vez para sumar y otra para pintar la tabla)
$datos_ventas = [];

if ($result) {
    while ($row = mysqli_fetch_assoc($result)) {
        $datos_ventas[] = $row;
        $total_dinero_dia += $row['costo_linea']; // Sumamos lo que costó cada línea
        $total_peso_dia += $row['peso_retirado'];
        $cantidad_transacciones++;
    }
}
