<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Colaborador | Bodega_IOT</title>
    <link rel="shortcut icon" href="imagenes/icono.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Seteamos el alto total y quitamos el scroll del body */
        body, html { height: 100%; margin: 0; overflow: hidden; background-color: #f1f5f9; }
        
        .app-layout {
            display: grid;
            grid-template-rows: 70px 1fr 40px; /* Header, Cuerpo, Footer */
            height: 100vh;
        }

        .main-content {
            display: grid;
            grid-template-cols: 240px 1fr; /* Menú lateral (240px) y Contenido */
            overflow: hidden;
        }

        /* Quitamos bordes de los iframes para que parezca una sola app */
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="app-layout">
        <header class="shadow-md z-10">
            <iframe src="cabeceraColaborador.html" name="cabecera"></iframe>
        </header>

        <main class="main-content">
            <aside class="bg-white border-r border-gray-200 shadow-sm">
                <iframe src="opcionesColaborador.html" name="menu"></iframe>
            </aside>

            <section class="bg-gray-50">
                <iframe src="dashboard.html" name="contenidoPrincipal"></iframe>
            </section>
        </main>

        <footer class="bg-white border-t border-gray-200">
            <iframe src="pieDePagina.html" name="pie"></iframe>
        </footer>
    </div>

</body>
</html>
