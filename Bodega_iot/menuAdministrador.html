<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador | Bodega_IOT</title>
    <link rel="shortcut icon" href="imagenes/icono.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Solo para asegurar que el scroll no rompa el diseño */
        body, html { height: 100vh; overflow: hidden; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="flex flex-col h-screen w-full">

        <header class="h-[70px] w-full bg-white shadow-md z-20">
            <iframe src="cabeceraAdministrador.html" name="cabecera" class="w-full h-full border-none"></iframe>
        </header>

        <main class="flex flex-1 overflow-hidden">
            
            <aside class="w-[260px] h-full bg-white border-r border-gray-200">
                <iframe src="opcionesAdministrador.html" name="menu" class="w-full h-full border-none"></iframe>
            </aside>

            <section class="flex-1 h-full bg-gray-50">
                <iframe src="dashboard.html" name="contenidoPrincipal" class="w-full h-full border-none"></iframe>
            </section>

        </main>

        <footer class="h-[40px] w-full bg-white border-t border-gray-200">
            <iframe src="pieDePagina.html" name="pie" class="w-full h-full border-none"></iframe>
        </footer>

    </div>

</body>
</html>
