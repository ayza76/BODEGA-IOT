<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagenes/icono.png"> 
    <title>Login | Bodega_IOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f0f9ff 0%, #e1f3d8 100%); 
        }
        .eco-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        
        <div class="eco-card shadow-2xl rounded-2xl p-8 border-t-8 border-green-600 transition-all duration-300 hover:shadow-green-100">
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 rounded-full mb-4 shadow-inner">
                    <span class="text-4xl">🌿</span>
                </div>
                <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">
                    Bodega <span class="text-green-600">IOT</span>
                </h2>
                <p class="text-gray-500 font-medium mt-1 uppercase text-xs tracking-widest">Sistema de Control Eco-Weight</p>
            </div>

            <form id="loginForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Usuario</label>
                    <input type="text" name="usuario" required
                           placeholder="Ingresa tu usuario"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none transition-all duration-200 focus:border-green-500 focus:ring-4 focus:ring-green-100">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Contraseña</label>
                    <input type="password" name="password" required
                           placeholder="••••••••"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none transition-all duration-200 focus:border-green-500 focus:ring-4 focus:ring-green-100">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2 ml-1">Rol de Acceso</label>
                    <div class="relative">
                        <select name="rol_seleccionado" id="rol_seleccionado" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none transition-all duration-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 appearance-none cursor-pointer">
                            <option value="">Selecciona tu cargo</option>
                            <option value="administrador">Administrador</option>
                            <option value="colaborador">Colaborador</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full py-4 px-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-lg shadow-green-200 transition-all duration-300 transform hover:-translate-y-1 active:scale-95 mt-4">
                    Acceder al Sistema
                </button>
            </form>
        </div>
        
        <div class="mt-10 text-center space-y-2">
            <p class="text-gray-400 text-xs font-medium uppercase tracking-widest">
                &copy; 2026 Bodega_IOT v2.0
            </p>
            <div class="flex justify-center space-x-4">
                <span class="h-1 w-8 bg-green-200 rounded-full"></span>
                <span class="h-1 w-8 bg-green-400 rounded-full"></span>
                <span class="h-1 w-12 bg-green-600 rounded-full"></span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue

            const rol = document.getElementById('rol_seleccionado').value;

            if (rol === "administrador") {
                window.location.href = "menuAdministrador.html";
            } else if (rol === "colaborador") {
                window.location.href = "menuColaborador.html";
            } else {
                alert("Por favor, selecciona un rol de acceso.");
            }
        });
    </script>
</body>
</html>
