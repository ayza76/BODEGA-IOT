<?php
// ARCHIVO DE CONFIGURACIÓN DE CONEXIÓN A LA BASE DE DATOS

// Credenciales del servidor XAMPP/MySQL
define('DB_SERVER', 'localhost');
define('DB_USERNAME', 'root');
define('DB_PASSWORD', ''); // Contraseña vacía porque XAMPP por defecto no tiene
define('DB_NAME', 'bodega_iot'); // Nombre de tu base de datos

/* Intentar conectarse a la base de datos MySQL */
$link = mysqli_connect(DB_SERVER, DB_USERNAME, DB_PASSWORD, DB_NAME);

// Verificar la conexión
if($link === false){
    die("ERROR: No se pudo conectar a la base de datos. " . mysqli_connect_error());
}

// Iniciar sesión (necesario para el login)
if (session_status() == PHP_SESSION_NONE) {
    session_start();
}
?>
