<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagenes/icono.png">
    <title>Ventas Header | Bodega_IOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #2E7D32; /* Tu verde Eco-Weight original */
        }
        .glass-header {
            background: rgba(46, 125, 50, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header class="glass-header sticky top-0 z-50 px-6 py-3 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-4 group">
                <div class="bg-white/10 p-2 rounded-lg transition-all duration-300 group-hover:bg-white/20">
                    <img src="imagenes/logo_peso.png" alt="Logo" class="h-10 w-auto">
                </div>
                <div>
                    <h1 class="text-white font-extrabold text-lg leading-tight tracking-wide uppercase">
                        Bodega <span class="text-green-300">IOT</span>
                    </h1>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        <p class="text-green-100 text-[10px] uppercase tracking-widest font-bold">Módulo de Ventas</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-5">
                <div class="hidden sm:flex flex-col text-right">
                    <span class="text-white font-semibold text-sm">Hola, Jose Gerson</span>
                    <span class="text-green-200 text-[9px] font-bold uppercase tracking-widest mt-0.5 opacity-80">
                        Rol: Colaborador
                    </span>
                </div>

                <a href="index.html" target="_top" 
                   class="flex items-center gap-2 bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-[11px] font-bold transition-all duration-300 shadow-lg shadow-red-900/30 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    SALIR
                </a>
            </div>
        </div>
    </header>
</body>
</html>
