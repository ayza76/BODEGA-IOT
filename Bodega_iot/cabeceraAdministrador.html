<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagenes/icono.png">
    <title>Header | Bodega_IOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #1B5E20; /* Color base verde oscuro */
        }
        .glass-header {
            background: rgba(46, 125, 50, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <header class="glass-header sticky top-0 z-50 px-6 py-3 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <div class="flex items-center gap-4 group cursor-pointer">
                <div class="bg-white/10 p-2 rounded-xl transition-transform group-hover:scale-110">
                    <img src="imagenes/logo_peso.png" alt="Logo" class="h-10 w-auto">
                </div>
                <div class="hidden md:block">
                    <h1 class="text-white font-extrabold text-lg leading-tight tracking-tight uppercase">
                        Bodega <span class="text-green-300">IOT</span>
                    </h1>
                    <p class="text-green-200 text-[10px] uppercase tracking-[3px] font-semibold">Sistema de Control</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="hidden sm:flex flex-col text-right border-r border-white/20 pr-6">
                    <span class="text-white font-bold text-sm">Hola, Jose Gerson</span>
                    <span class="text-green-300 text-[10px] font-bold uppercase tracking-wider bg-black/20 px-2 py-0.5 rounded-full self-end mt-1">
                        Administrador
                    </span>
                </div>

                <a href="index.html" target="_top" 
                   class="flex items-center gap-2 bg-red-500/20 hover:bg-red-500 text-red-100 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all duration-300 border border-red-500/30 active:scale-95 shadow-lg shadow-red-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Cerrar Sesión
                </a>
            </div>
        </div>
    </header>
</body>
</html>
